name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
      - run: nix flake check --no-build --impure
      - run: nix build .#homeConfigurations.jeel.activationPackage
      - run: nix build .#homeConfigurations.jeel-ai.activationPackage
