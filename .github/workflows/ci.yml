name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix flake check --no-build --impure
      - run: nix build .#homeConfigurations.jeel.activationPackage
      - run: nix build .#homeConfigurations.jeel-ai.activationPackage
