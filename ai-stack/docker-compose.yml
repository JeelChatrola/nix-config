services:

  # ---------------------------------------------------------------------------
  # Ollama - Local LLM runner
  # Access: http://localhost:11434
  # Bump image tag when pulls return 412 (newer Ollama required); then:
  #   docker compose -f ai-stack/docker-compose.yml pull ollama && docker compose -f ai-stack/docker-compose.yml up -d ollama
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.24.0
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - HF_TOKEN=${HF_TOKEN:-}

  # ---------------------------------------------------------------------------
  # SearXNG - self-hosted search backend for MCP web search
  # ---------------------------------------------------------------------------
  searxng:
    image: searxng/searxng:2026.4.13-ee66b070a
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro

volumes:
  ollama-models: