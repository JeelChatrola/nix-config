mcp_servers:
  searxng:
    command: "uv"
    args:
      - "tool"
      - "run"
      - "searxng-mcp-server"
      - "--searxng-url"
      - "__SEARXNG_URL__"
    timeout: 180
    connect_timeout: 30

  code-review-graph:
    command: "uv"
    args: ["tool", "run", "--from", "code-review-graph", "code-review-graph", "serve"]

  arxiv:
    command: "uv"
    args: ["tool", "run", "arxiv-mcp-server"]

  context7:
    command: "npx"
    args: ["-y", "@upstash/context7-mcp@3.0.0"]

  deepwiki:
    url: "https://mcp.deepwiki.com/mcp"
