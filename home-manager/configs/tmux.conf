# Tmux configuration
# This file contains all your tmux settings and key bindings

# =============================================================================
# TERMINAL SETTINGS
# =============================================================================
# Set default terminal to support 256 colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# =============================================================================
# GRUVBOX STATUS BAR
# Layout adapted from https://github.com/binoymanoj/dotfiles/blob/master/tmux/tmux.conf
# =============================================================================
set -g status on
set -g status-position top
set -g status-interval 3
set -g status-justify left
set -g status-style 'bg=#282828,fg=#ebdbb2'
set -g status-left-length 100
set -g status-right-length 100

set -g pane-border-style 'fg=#504945'
set -g pane-active-border-style 'fg=#fabd2f'
set -g message-style 'bg=#d79921,fg=#282828,bold'
set -g message-command-style 'bg=#d79921,fg=#282828,bold'

setw -g window-status-format '#[fg=#928374,bg=#282828] #I:#W '
setw -g window-status-current-format '#[fg=#fabd2f,bg=#282828,bold] #I:#W '
setw -g window-status-separator ''

set -g status-left '#[fg=#83a598,bold]  #S #[fg=#928374]│ '
set -g status-right '\
#[fg=#83a598] #[fg=#ebdbb2]#(free -b | awk '\''/^Mem/ { printf("%.1fG", $3 / 1024 / 1024 / 1024) }'\'') \
#[fg=#928374]│ \
#[fg=#83a598] #[fg=#ebdbb2]#{cpu_percentage} \
#[fg=#928374]│ \
#[fg=#83a598]󰢮 #[fg=#ebdbb2]#{gpu_percentage} \
#[fg=#928374]│ \
#[fg=#83a598] #[fg=#ebdbb2]#(date +%I:%M\ %p) '

setw -g mode-style 'bg=#fabd2f,fg=#282828'
setw -g clock-mode-colour '#fabd2f'
setw -g clock-mode-style 12

# =============================================================================
# GENERAL SETTINGS
# =============================================================================
# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Increase scrollback buffer size
set -g history-limit 10000

# Enable focus events
set -g focus-events on

# Faster key repetition
set -s escape-time 0

# =============================================================================
# KEY BINDINGS
# =============================================================================
# Reload config file
bind -N 'Reload tmux configuration' r source-file ~/.config/tmux/tmux.conf \; display 'Reloaded!'

# Split panes using | and -
bind -N 'Split pane horizontally' h split-window -h
bind -N 'Split pane vertically' v split-window -v
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes using Shift-arrow (without prefix)
# Unbind old Ctrl-arrow keys to prevent conflicts
unbind -n C-Left
unbind -n C-Right
unbind -n C-Up
unbind -n C-Down

bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Up resize-pane -U 5
bind -n S-Down resize-pane -D 5

# =============================================================================
# CUSTOM KEY BINDINGS
# =============================================================================
# Quick session management
bind -N 'Create session' S new-session
bind -N 'Kill current session' X confirm-before -p 'Kill session #S? (y/n)' kill-session

# Sesh combines existing tmux sessions and zoxide directories.
unbind F
bind -N 'Search project sessions' f display-popup -E -w 80% -h 70% 'sesh picker --icons'

# Search shortcuts across tmux, the shell, Neovim, and Ghostty.
bind -N 'Search workflow shortcuts' ? display-popup -E -w 90% -h 85% 'workflow-help'

# Copy mode improvements
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
