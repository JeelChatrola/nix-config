# Tmux configuration
# This file contains all your tmux settings and key bindings

# =============================================================================
# TERMINAL SETTINGS
# =============================================================================
# Set default terminal to support 256 colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# =============================================================================
# STATUS BAR CONFIGURATION
# =============================================================================
# Tokyo Night status and pane colors.
set -g status-left-length 40
set -g status-right-length 80
set -g status-justify left
set -g status-position top
set -g status 2
set -g status-interval 5
set -g status-style 'bg=#1a1b26,fg=#c0caf5'
set -g status-format[1] "#[fg=#3b4261]#(awk -v width=#{client_width} 'BEGIN { for (i = 0; i < width; i++) printf \"─\" }')"
set -g message-style 'bg=#7aa2f7,fg=#1a1b26,bold'
set -g message-command-style 'bg=#bb9af7,fg=#1a1b26,bold'
set -g pane-border-style 'fg=#292e42'
set -g pane-active-border-style 'fg=#7aa2f7'
set -g status-left '#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7] '
set -g status-right '#[fg=#7dcfff]#(tmux-metrics)#{?client_prefix, #[fg=#565f89]│ #[fg=#bb9af7]PREFIX,} #[fg=#565f89]│ #[fg=#9ece6a]%Y-%m-%d #[fg=#7aa2f7]%-I:%M %p '
setw -g window-status-format '#[fg=#565f89] #I:#W '
setw -g window-status-current-format '#[bg=#292e42,fg=#7aa2f7,bold] #I:#W #[bg=#1a1b26,fg=#292e42]'
setw -g window-status-activity-style 'fg=#ff9e64,bold'

# =============================================================================
# GENERAL SETTINGS
# =============================================================================
# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Increase scrollback buffer size
set -g history-limit 10000

# Enable focus events
set -g focus-events on

# Faster key repetition
set -s escape-time 0

# =============================================================================
# KEY BINDINGS
# =============================================================================
# Reload config file
bind -N 'Reload tmux configuration' r source-file ~/.config/tmux/tmux.conf \; display 'Reloaded!'

# Split panes using | and -
bind h split-window -h
bind v split-window -v
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use the same Ctrl+h/j/k/l motion across tmux and Neovim splits.
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind C-l send-keys C-l

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# Resize panes using Shift-arrow (without prefix)
# Unbind old Ctrl-arrow keys to prevent conflicts
unbind -n C-Left
unbind -n C-Right
unbind -n C-Up
unbind -n C-Down

bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Up resize-pane -U 5
bind -n S-Down resize-pane -D 5

# =============================================================================
# CUSTOM KEY BINDINGS
# =============================================================================
# Quick session management
bind -N 'Create session' S new-session
bind -N 'Kill session' X kill-session

# Fuzzy project sessions: f opens a shell, F starts Neovim in new sessions.
bind -N 'Open project session' f display-popup -E -w 80% -h 70% 'tmux-project'
bind -N 'Open project in Neovim' F display-popup -E -w 80% -h 70% 'tmux-project --editor'

# Search annotated tmux bindings without leaving the keyboard.
bind -N 'Search tmux keybindings' ? display-popup -E -w 90% -h 80% 'tmux list-keys -N | fzf --layout=reverse --border=sharp --prompt="tmux> "'

# Copy mode improvements
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
