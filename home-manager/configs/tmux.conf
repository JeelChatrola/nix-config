# Tmux configuration
# This file contains all your tmux settings and key bindings

# =============================================================================
# TERMINAL SETTINGS
# =============================================================================
# Set default terminal to support 256 colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# =============================================================================
# STATUS BAR CONFIGURATION
# =============================================================================
# Tokyo Night status and pane colors.
set -g status-left-length 40
set -g status-right-length 80
set -g status-justify left
set -g status-position top
set -g status-interval 5
set -g status-style 'bg=#1a1b26,fg=#c0caf5'
set -g message-style 'bg=#7aa2f7,fg=#1a1b26,bold'
set -g message-command-style 'bg=#bb9af7,fg=#1a1b26,bold'
set -g pane-border-style 'fg=#292e42'
set -g pane-active-border-style 'fg=#7aa2f7'
set -g status-left '#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7] '
set -g status-right '#[fg=#7dcfff]CPU #{cpu_percentage} #[fg=#565f89]│ #[fg=#7aa2f7]GPU #{gpu_percentage} #[fg=#565f89]│ #[fg=#bb9af7]#{?client_prefix,PREFIX ,}#[fg=#565f89]│ #[fg=#9ece6a]%Y-%m-%d #[fg=#7aa2f7]%H:%M '
setw -g window-status-format '#[fg=#565f89] #I:#W '
setw -g window-status-current-format '#[bg=#292e42,fg=#7aa2f7,bold] #I:#W #[bg=#1a1b26,fg=#292e42]'
setw -g window-status-activity-style 'fg=#ff9e64,bold'

# =============================================================================
# GENERAL SETTINGS
# =============================================================================
# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Increase scrollback buffer size
set -g history-limit 10000

# Enable focus events
set -g focus-events on

# Faster key repetition
set -s escape-time 0

# =============================================================================
# KEY BINDINGS
# =============================================================================
# Reload config file
bind -N 'Reload tmux configuration' r source-file ~/.config/tmux/tmux.conf \; display 'Reloaded!'

# Split panes using | and -
bind -N 'Split pane horizontally' h split-window -h
bind -N 'Split pane vertically' v split-window -v
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes using Shift-arrow (without prefix)
# Unbind old Ctrl-arrow keys to prevent conflicts
unbind -n C-Left
unbind -n C-Right
unbind -n C-Up
unbind -n C-Down

bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Up resize-pane -U 5
bind -n S-Down resize-pane -D 5

# =============================================================================
# CUSTOM KEY BINDINGS
# =============================================================================
# Quick session management
bind -N 'Create session' S new-session
bind -N 'Kill current session' X confirm-before -p 'Kill session #S? (y/n)' kill-session

# Sesh combines existing tmux sessions and zoxide directories.
unbind F
bind -N 'Search project sessions' f display-popup -E -w 80% -h 70% 'sesh picker --icons'

# Search shortcuts across tmux, the shell, Neovim, and Ghostty.
bind -N 'Search workflow shortcuts' ? display-popup -E -w 90% -h 85% 'workflow-help'

# Copy mode improvements
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
