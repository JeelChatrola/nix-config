"$schema" = "https://starship.rs/config-schema.json"

format = "$directory$git_branch$git_status$character"
right_format = "$cmd_duration$python$nodejs$bun$rust$golang"
palette = "tokyo_night"
add_newline = true
continuation_prompt = "[∙](bright-black) "

[palettes.tokyo_night]
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
orange = "#ff9e64"
purple = "#bb9af7"
red = "#f7768e"
yellow = "#e0af68"
foreground = "#c0caf5"
muted = "#565f89"

[directory]
format = "[$path]($style) "
style = "bold blue"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "purple"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "orange"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[cmd_duration]
format = "[$duration](yellow) "
min_time = 2000

[python]
format = "[$symbol$version](yellow) "
symbol = " "

[nodejs]
format = "[$symbol$version](green) "
symbol = " "

[bun]
format = "[$symbol$version](orange) "
symbol = " "

[rust]
format = "[$symbol$version](orange) "
symbol = " "

[golang]
format = "[$symbol$version](cyan) "
symbol = " "
