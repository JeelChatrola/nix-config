# Alacritty — native Linux terminal feel (selection, mouse paste, standard shortcuts).
# GPU binary comes from the system package manager; home-manager only manages this file.

[general]
live_config_reload = true

[window]
dimensions = { columns = 120, lines = 35 }
dynamic_padding = true
padding = { x = 6, y = 6 }

[font]
size = 11.0
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }

[selection]
save_to_clipboard = true

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.normal]
black = "#282828"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

[colors.bright]
black = "#928374"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
magenta = "#d3869b"
cyan = "#8ec07c"
white = "#ebdbb2"

[mouse]
bindings = [
  { mouse = "Right", action = "Paste" },
  { mouse = "Middle", action = "PasteSelection" },
]

# Terminal-level clipboard (does not steal Ctrl+C from running programs).
[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "V", mods = "Control", action = "Paste" },
  { key = "Insert", mods = "Shift", action = "Paste" },
  { key = "Insert", mods = "Control", action = "Copy" },
]
